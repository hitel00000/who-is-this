<!DOCTYPE html>
<html lang="ko">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>Who is this?</title>

<link rel="manifest" href="manifest.json">

<style>

*{
box-sizing:border-box;
}

body{
margin:0;
background:#000;
color:white;
font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
display:flex;
flex-direction:column;
height:100vh;
}

header{
text-align:center;
font-size:28px;
padding:20px;
font-weight:700;
}

.grid{
flex:1;
display:grid;
grid-template-columns:1fr 1fr;
grid-template-rows:1fr 1fr;
gap:16px;
padding:16px;
}

button{
font-size:34px;
border:none;
border-radius:26px;
font-weight:700;
color:white;
box-shadow:0 10px 20px rgba(0,0,0,.4);
}

button:active{
transform:scale(.95);
}

.who{background:#ff3b30}
.ok{background:#34c759}
.yes{background:#007aff}
.no{background:#ff9500}

footer{
text-align:center;
opacity:.5;
padding:10px;
font-size:14px;
}

</style>

</head>

<body>

<header>Who is this?</header>

<div class="grid">

<button class="who" onclick="play('who')">
누구세요
</button>

<button class="ok" onclick="play('ok')">
괜찮아요
</button>

<button class="yes" onclick="play('yes')">
네
</button>

<button class="no" onclick="play('no')">
아니오
</button>

</div>

<footer>Tap button to speak</footer>

<script>

const sounds={
who:new Audio("audio/who.mp3"),
ok:new Audio("audio/ok.mp3"),
yes:new Audio("audio/yes.mp3"),
no:new Audio("audio/no.mp3")
};

function play(name){

if(navigator.vibrate){
navigator.vibrate([100,50,100]);
}

let audio=sounds[name];

audio.currentTime=0;
audio.play();

}

if("serviceWorker" in navigator){
navigator.serviceWorker.register("sw.js");
}

</script>

</body>
</html>
