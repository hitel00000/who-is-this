<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />

    <title>Who is this?</title>

    <link rel="manifest" href="manifest.json" />

    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: #000;
        color: white;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      header {
        text-align: center;
        font-size: 28px;
        padding: 20px;
        font-weight: 700;
      }

      .tone {
        display: flex;
        align-items: center;
        gap: 12px;
        padding: 0 16px 8px;
      }

      .tone label {
        font-size: 14px;
        opacity: 0.7;
        min-width: 60px;
      }

      .tone input[type="range"] {
        width: 100%;
      }

      .control-toggle {
        margin: 0 16px 8px;
        width: calc(100% - 32px);
        font-size: 16px;
        padding: 10px 14px;
        border-radius: 16px;
        box-shadow: none;
        opacity: 0.85;
      }

      .control-panel {
        padding: 0 16px 8px;
      }

      .grid {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        grid-template-rows: 1fr 1fr;
        gap: 16px;
        padding: 16px;
      }

      button {
        font-size: 34px;
        border: none;
        border-radius: 26px;
        font-weight: 700;
        color: white;
        box-shadow: 0 10px 20px rgba(0, 0, 0, 0.4);
      }

      button:active {
        transform: scale(0.95);
      }

      .who {
        background: #ff3b30;
      }

      .ok {
        background: #34c759;
      }

      .yes {
        background: #007aff;
      }

      .no {
        background: #ff9500;
      }

      footer {
        text-align: center;
        opacity: 0.5;
        padding: 10px;
        font-size: 14px;
      }
    </style>
  </head>

  <body>
    <header>Who is this?</header>

    <div class="tone">
      <label for="tone">Tone</label>
      <input id="tone" type="range" min="0" max="1" step="0.01" value="0.55" />
    </div>

    <button id="toggleControls" class="control-toggle" type="button">Pitch/Volume settings</button>

    <div id="extraControls" class="control-panel" hidden>
      <div class="tone">
        <label for="pitch">Pitch</label>
        <input id="pitch" type="range" min="0" max="1" step="0.01" value="0.5" />
      </div>

      <div class="tone">
        <label for="volume">Volume</label>
        <input id="volume" type="range" min="0" max="1" step="0.01" value="1" />
      </div>
    </div>

    <div class="grid">
      <button class="who" onclick="play('who')">누구세요</button>

      <button class="ok" onclick="play('ok')">괜찮아요</button>

      <button class="yes" onclick="play('yes')">네</button>

      <button class="no" onclick="play('no')">아니오</button>
    </div>

    <footer>Tap button to speak</footer>

    <script>
      // Web Audio API로 mp3를 디코드/재생하면서, 실시간 “톤(색감)” 필터를 0~1 값으로 제어합니다.
      // 0에 가까울수록 더 먹먹(저역 통과, 고역 감쇠), 1에 가까울수록 더 밝게(고역 통과) 들리도록 HP/LP 컷오프를 바꿉니다.
      const filePaths = {
        who: "audio/who.mp3",
        ok: "audio/ok.mp3",
        yes: "audio/yes.mp3",
        no: "audio/no.mp3",
      };

      const TONE_STORAGE_KEY = "who-is-this:tone";
      const PITCH_STORAGE_KEY = "who-is-this:pitch";
      const VOLUME_STORAGE_KEY = "who-is-this:volume";
      const CONTROLS_OPEN_STORAGE_KEY = "who-is-this:controlsOpen";

      const toneEl = document.getElementById("tone");
      const pitchEl = document.getElementById("pitch");
      const volumeEl = document.getElementById("volume");
      const toggleControlsEl = document.getElementById("toggleControls");
      const extraControlsEl = document.getElementById("extraControls");

      let audioCtx = null;
      const buffers = {};

      let source = null;
      let highpass = null;
      let peakingEQ = null;
      let lowpass = null;
      let gainNode = null;

      function clamp01(x) {
        const n = Number(x);
        if (!Number.isFinite(n)) return 0;
        return Math.max(0, Math.min(1, n));
      }

      let lastTone = toneEl ? parseFloat(toneEl.value) : 0.55;
      let lastPitch = pitchEl ? clamp01(pitchEl.value) : 0.5;
      let lastVolume = volumeEl ? clamp01(volumeEl.value) : 1;

      // 페이지 로드 시 저장된 tone 값을 복원합니다.
      if (toneEl) {
        try {
          const raw = localStorage.getItem(TONE_STORAGE_KEY);
          if (raw !== null) {
            const v = Number(raw);
            if (Number.isFinite(v)) {
              const clamped = Math.max(0, Math.min(1, v));
              toneEl.value = String(clamped);
              lastTone = clamped;
            }
          }
        } catch (_) {
          // localStorage 접근이 차단된 환경에서도 앱이 동작해야 합니다.
        }
      }

      // 페이지 로드 시 pitch/volume 값을 복원합니다.
      if (pitchEl) {
        try {
          const raw = localStorage.getItem(PITCH_STORAGE_KEY);
          if (raw !== null) {
            lastPitch = clamp01(raw);
            pitchEl.value = String(lastPitch);
          }
        } catch (_) {}
      }

      if (volumeEl) {
        try {
          const raw = localStorage.getItem(VOLUME_STORAGE_KEY);
          if (raw !== null) {
            lastVolume = clamp01(raw);
            volumeEl.value = String(lastVolume);
          }
        } catch (_) {}
      }

      // pitch/volume 패널 열림 상태를 복원합니다. (기본은 닫힘)
      if (toggleControlsEl && extraControlsEl) {
        try {
          const raw = localStorage.getItem(CONTROLS_OPEN_STORAGE_KEY);
          const isOpen = raw === "true";
          extraControlsEl.hidden = !isOpen;
          toggleControlsEl.textContent = isOpen
            ? "Hide Pitch/Volume settings"
            : "Pitch/Volume settings";
        } catch (_) {
          // localStorage 차단 시 기본 hidden(닫힘) 유지
          toggleControlsEl.textContent = "Pitch/Volume settings";
        }
      }

      function ensureAudioGraph() {
        if (audioCtx) return;

        audioCtx = new (window.AudioContext || window.webkitAudioContext)();

        highpass = audioCtx.createBiquadFilter();
        highpass.type = "highpass";

        peakingEQ = audioCtx.createBiquadFilter();
        peakingEQ.type = "peaking";
        peakingEQ.frequency.value = 3000; // 3kHz에 집중
        peakingEQ.Q.value = 1.5;

        lowpass = audioCtx.createBiquadFilter();
        lowpass.type = "lowpass";

        gainNode = audioCtx.createGain();
        gainNode.gain.value = 1;

        highpass.connect(peakingEQ);
        peakingEQ.connect(lowpass);
        lowpass.connect(gainNode);
        gainNode.connect(audioCtx.destination);

        applyTone(lastTone);

        // 재생 중이 아닐 때는 source가 없으므로 volume(gain)만 즉시 적용합니다.
        applyVolume(lastVolume);
      }

      function applyTone(v) {
        lastTone = Number(v);
        if (!audioCtx || !highpass || !lowpass || !peakingEQ) return;

        const t = Math.max(0, Math.min(1, lastTone));

        // 톤 0..1 -> HP/LP 컷오프와 약간의 Q 보정
        const hp = 80 + t * 220; // 80..300 Hz
        const lp = 800 + t * 7200; // 800..8000 Hz
        const q = 0.6 + t * 1.0; // 0.6..1.6

        // 이퀄라이저: 톤 값에 따라 3kHz 대역 부스트/컷
        // 0에 가까울수록 -12dB (어두움), 1에 가까울수록 +12dB (밝음)
        const eqGain = -12 + t * 24; // -12..+12 dB

        const now = audioCtx.currentTime;
        highpass.frequency.setTargetAtTime(hp, now, 0.02);
        lowpass.frequency.setTargetAtTime(lp, now, 0.02);
        lowpass.Q.setTargetAtTime(q, now, 0.02);
        peakingEQ.gain.setTargetAtTime(eqGain, now, 0.02);
      }

      function playbackRateFromPitch(pitch01) {
        // pitch(0..1) -> playbackRate(0.5..1.5), 0.5가 정중앙(1.0)입니다.
        return 0.5 + clamp01(pitch01) * 1.0;
      }

      function applyPitch(pitch01) {
        lastPitch = clamp01(pitch01);
        if (!audioCtx || !source || !source.playbackRate) return;

        const rate = playbackRateFromPitch(lastPitch);
        const now = audioCtx.currentTime;
        source.playbackRate.setTargetAtTime(rate, now, 0.02);
      }

      function applyVolume(volume01) {
        lastVolume = clamp01(volume01);
        if (!audioCtx || !gainNode) return;

        const now = audioCtx.currentTime;
        // 0..1 -> gain(선형). 필요하면 나중에 곡선 보정도 추가 가능.
        gainNode.gain.setTargetAtTime(lastVolume, now, 0.02);
      }

      if (toneEl) {
        toneEl.addEventListener("input", (e) => {
          applyTone(e.target.value);
          try {
            localStorage.setItem(TONE_STORAGE_KEY, String(lastTone));
          } catch (_) {}
        });
      }

      if (pitchEl) {
        pitchEl.addEventListener("input", (e) => {
          applyPitch(e.target.value);
          try {
            localStorage.setItem(PITCH_STORAGE_KEY, String(lastPitch));
          } catch (_) {}
        });
      }

      if (volumeEl) {
        volumeEl.addEventListener("input", (e) => {
          applyVolume(e.target.value);
          try {
            localStorage.setItem(VOLUME_STORAGE_KEY, String(lastVolume));
          } catch (_) {}
        });
      }

      if (toggleControlsEl && extraControlsEl) {
        toggleControlsEl.addEventListener("click", () => {
          const willOpen = extraControlsEl.hidden;
          extraControlsEl.hidden = !willOpen;
          toggleControlsEl.textContent = willOpen
            ? "Hide Pitch/Volume settings"
            : "Pitch/Volume settings";

          try {
            localStorage.setItem(CONTROLS_OPEN_STORAGE_KEY, String(willOpen));
          } catch (_) {}
        });
      }

      async function getBuffer(name) {
        ensureAudioGraph();
        if (buffers[name]) return buffers[name];

        const res = await fetch(filePaths[name]);
        const ab = await res.arrayBuffer();
        buffers[name] = await audioCtx.decodeAudioData(ab);
        return buffers[name];
      }

      function play(name) {
        // onclick="play('who')" 같은 사용자 제스처에서 호출되므로 resume은 여기서 처리
        ensureAudioGraph();
        audioCtx.resume();

        if (navigator.vibrate) {
          navigator.vibrate([100, 50, 100]);
        }

        // 현재 재생 중이면 중단 후 처음부터 다시 시작합니다.
        if (source) {
          try {
            source.stop();
          } catch (_) {}
          try {
            source.disconnect();
          } catch (_) {}
        }

        getBuffer(name)
          .then((buffer) => {
            source = audioCtx.createBufferSource();
            source.buffer = buffer;

            // 피치/음량 슬라이더는 다음 단계에서 연결하고, 지금은 톤(필터)만 적용합니다.
            source.connect(highpass);

            // pitch(0..1) -> playbackRate(0.5..1.5)
            source.playbackRate.value = playbackRateFromPitch(lastPitch);
            source.start(0);
          })
          .catch((err) => {
            console.error("Failed to play audio:", err);
          });
      }

      if ("serviceWorker" in navigator) {
        navigator.serviceWorker.register("sw.js");
      }
    </script>
  </body>
</html>
